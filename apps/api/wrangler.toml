name = "clearline-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
# The bundled internal packages pull in node-shaped deps (Solana kit / drizzle);
# nodejs_compat lets esbuild resolve them under the Workers runtime.
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "clearline"
database_id = "d6db3547-2127-4003-b041-bb8ed9f72a05"
migrations_dir = "migrations"
